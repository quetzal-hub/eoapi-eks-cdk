apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: eoapi
spec:
  replicas: 1
  selector:
    matchLabels: {app: jaeger}
  template:
    metadata: {labels: {app: jaeger}}
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - containerPort: 16686
            - containerPort: 4317
            - containerPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: eoapi
spec:
  selector: {app: jaeger}
  ports:
    - {name: ui, port: 16686, targetPort: 16686}
    - {name: otlp-grpc, port: 4317, targetPort: 4317}
    - {name: otlp-http, port: 4318, targetPort: 4318}